name: Deploy API to Azure App Service

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Publish
        run: dotnet publish backend/HRLeave.Api -c Release -r linux-x64 --self-contained false -o publish_output

      - name: Zip artifact
        run: cd publish_output && zip -r ../hrleave-api.zip .

      - uses: azure/webapps-deploy@v3
        with:
          app-name: hrleave-api-fa
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: hrleave-api.zip
